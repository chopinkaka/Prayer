<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>중보기도 기도제목</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Apple SD Gothic Neo', '맑은 고딕', sans-serif;
    background: linear-gradient(135deg, #e8f4f8 0%, #f0e6ff 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .card {
    background: white; border-radius: 20px; padding: 40px 36px;
    width: 100%; max-width: 480px;
    box-shadow: 0 8px 32px rgba(100,60,180,0.12);
  }
  .header { text-align: center; margin-bottom: 32px; }
  .header .icon { font-size: 40px; margin-bottom: 10px; }
  .header h1 { font-size: 22px; font-weight: 800; color: #3d2b6b; margin-bottom: 6px; }
  .header p { font-size: 14px; color: #999; line-height: 1.6; }
  label { display: block; font-size: 13px; font-weight: 700; color: #5a3fa0; margin-bottom: 6px; margin-top: 20px; }
  input[type="text"], textarea {
    width: 100%; border: 2px solid #e0d8f5; border-radius: 10px;
    padding: 12px 14px; font-size: 15px; font-family: inherit;
    color: #333; outline: none; transition: border-color 0.2s; resize: none;
  }
  input[type="text"]:focus, textarea:focus { border-color: #7c5cbf; }
  textarea { height: 150px; }
  .char-count { text-align: right; font-size: 12px; color: #bbb; margin-top: 4px; }
  .error { color: #e53e3e; font-size: 12px; margin-top: 5px; display: none; }
  .btn {
    width: 100%; margin-top: 28px; padding: 15px;
    background: linear-gradient(135deg, #7c5cbf, #9b72d8);
    color: white; border: none; border-radius: 12px;
    font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.88; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .success { display: none; text-align: center; padding: 10px 0; }
  .success .s-icon { font-size: 54px; margin-bottom: 14px; }
  .success h2 { font-size: 20px; color: #3d2b6b; margin-bottom: 8px; }
  .success p { font-size: 14px; color: #999; line-height: 1.7; }
  .again-btn {
    margin-top: 22px; width: 100%; padding: 12px;
    background: transparent; border: 2px solid #7c5cbf; color: #7c5cbf;
    border-radius: 12px; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: inherit;
  }
  .again-btn:hover { background: #f5f0ff; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="icon">✝️</div>
    <h1>중보기도 기도제목</h1>
    <p>기도제목을 남겨주시면<br>함께 기도하겠습니다 🙏</p>
  </div>

  <div id="form-area">
    <label for="name">이름</label>
    <input type="text" id="name" placeholder="성함 (익명 원하시면 '익명'으로 입력)" maxlength="20">
    <div class="error" id="err-name">이름을 입력해주세요.</div>

    <label for="prayer">기도제목</label>
    <textarea id="prayer" placeholder="기도제목을 자유롭게 적어주세요" maxlength="500"></textarea>
    <div class="char-count"><span id="cnt">0</span> / 500</div>
    <div class="error" id="err-prayer">기도제목을 입력해주세요.</div>

    <button class="btn" id="submit-btn" onclick="submitPrayer()">기도제목 제출하기 🙏</button>
  </div>

  <div class="success" id="success-area">
    <div class="s-icon">🙏</div>
    <h2>기도제목이 전달되었습니다</h2>
    <p>소중한 기도제목을 나눠주셔서 감사합니다.<br>함께 중보기도 드리겠습니다.</p>
    <button class="again-btn" onclick="resetForm()">기도제목 추가 제출하기</button>
  </div>
</div>

<script>
  document.getElementById('prayer').addEventListener('input', function() {
    document.getElementById('cnt').textContent = this.value.length;
  });

  async function submitPrayer() {
    const name = document.getElementById('name').value.trim();
    const prayer = document.getElementById('prayer').value.trim();
    let ok = true;

    document.getElementById('err-name').style.display = 'none';
    document.getElementById('err-prayer').style.display = 'none';

    if (!name)   { document.getElementById('err-name').style.display = 'block';   ok = false; }
    if (!prayer) { document.getElementById('err-prayer').style.display = 'block'; ok = false; }
    if (!ok) return;

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = '제출 중...';

    try {
      const url = 'https://script.google.com/macros/s/AKfycbyHVVRaPMsUaebMlzWlkTOohxdtyBqYvwmDjrXIKd9IQ-5A4je7jahEVtICwxNRibXe/exec?action=submit&name=' + encodeURIComponent(name) + '&prayer=' + encodeURIComponent(prayer);
      await fetch(url, { method: 'GET', mode: 'no-cors' });
      document.getElementById('form-area').style.display = 'none';
      document.getElementById('success-area').style.display = 'block';
    } catch(e) {
      alert('제출 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
      btn.disabled = false;
      btn.textContent = '기도제목 제출하기 🙏';
    }
  }

  function resetForm() {
    document.getElementById('name').value = '';
    document.getElementById('prayer').value = '';
    document.getElementById('cnt').textContent = '0';
    document.getElementById('submit-btn').disabled = false;
    document.getElementById('submit-btn').textContent = '기도제목 제출하기 🙏';
    document.getElementById('form-area').style.display = 'block';
    document.getElementById('success-area').style.display = 'none';
  }
</script>
</body>
</html>
